parameters:
  - name: newRepoName
    type: string
  - name: projectName
    type: string
  - name: repoTemplate
    type: string

jobs:
  - job: Validacion
    displayName: "Job 1 · Validación y selección de template"
    pool:
      name: Default
    dependsOn: Prerequisitos
    steps:
      - bash: |
          set -e

          REPO_NAME="${{ parameters.newRepoName }}"
          if [ -z "$REPO_NAME" ]; then echo "❌ Nombre de repositorio vacío"; exit 1; fi
          if [ ${#REPO_NAME} -gt 100 ]; then echo "❌ Nombre de repositorio demasiado largo (máx 100 caracteres)"; exit 1; fi
          if ! echo "$REPO_NAME" | grep -qE '^[a-zA-Z0-9._-]+$'; then echo "❌ Nombre de repositorio con caracteres inválidos."; exit 1; fi
          echo "✅ Nombre de repositorio válido: $REPO_NAME"

          PROJECT_NAME="${{ parameters.projectName }}"
          if [ -z "$PROJECT_NAME" ]; then echo "❌ Nombre de proyecto vacío"; exit 1; fi
          if [ ${#PROJECT_NAME} -gt 100 ]; then echo "❌ Nombre de proyecto demasiado largo (máx 100 caracteres)"; exit 1; fi
          echo "✅ Nombre de proyecto válido: $PROJECT_NAME"
        displayName: "Validar parámetros de entrada"

      - bash: |
          set -e
          case "${{ parameters.repoTemplate }}" in
            "springboot") echo "##vso[task.setvariable variable=templateRepo;isOutput=true]$(springbootRepo)" ;;
            "react")      echo "##vso[task.setvariable variable=templateRepo;isOutput=true]$(reactRepo)" ;;
            "angular")    echo "##vso[task.setvariable variable=templateRepo;isOutput=true]$(angularRepo)" ;;
            "node")       echo "##vso[task.setvariable variable=templateRepo;isOutput=true]$(nodeRepo)" ;;
            *)            echo "❌ Template no reconocido: ${{ parameters.repoTemplate }}"; exit 1 ;;
          esac
          echo "✅ Template seleccionado: ${{ parameters.repoTemplate }}"
        displayName: "Seleccionar template"
        name: SeleccionTemplate
