jobs:
  - job: Diagnostico
    displayName: "Job 0 · Diagnóstico - Payload recibido desde Port"
    pool:
      name: Default
    steps:
      - bash: |
          echo "============================================"
          echo "   TODAS LAS VARIABLES DE ENTORNO"
          echo "============================================"
          env | sort
          echo ""
          echo "============================================"
          echo "   ARCHIVOS EN EL WORKSPACE"
          echo "============================================"
          find /azp/_work -type f 2>/dev/null | head -50
          echo ""
          echo "============================================"
          echo "   CONTENIDO DE ARCHIVOS JSON/TEMP"
          echo "============================================"
          find /azp/_work -name "*.json" -type f 2>/dev/null | while read f; do
            echo "--- $f ---"
            cat "$f"
            echo ""
          done
          echo ""
          echo "============================================"
          echo "   ARCHIVOS TEMP"
          echo "============================================"
          find /azp/_work/_temp -type f 2>/dev/null | while read f; do
            echo "--- $f ---"
            cat "$f"
            echo ""
          done
        displayName: "Imprimir todos los parámetros recibidos"
