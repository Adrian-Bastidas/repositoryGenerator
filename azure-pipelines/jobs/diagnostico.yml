jobs:
  - job: Diagnostico
    displayName: "Job 0 · Diagnóstico - Payload recibido desde Port"
    pool:
      name: Default
    steps:
      - bash: |
          echo "============================================"
          echo "   TODAS LAS VARIABLES DE ENTORNO"
          echo "============================================"
          env | sort
          echo ""
          echo "============================================"
          echo "   VARIABLES QUE CONTENGAN 'PORT' O 'WEBHOOK'"
          echo "============================================"
          env | grep -i -E "port|webhook|trigger" || echo "Ninguna encontrada"
        displayName: "Imprimir todos los parámetros recibidos"
