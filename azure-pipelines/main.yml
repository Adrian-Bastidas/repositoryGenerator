trigger: none

resources:
  webhooks:
    - webhook: port_trigger
      connection: port_trigger

variables:
  - template: variables/variables.yml
  - group: github-secrets

stages:
  - stage: Diagnostico
    displayName: "Diagnóstico - Payload recibido desde Port"
    jobs:
      - job: inspecionar_payload
        displayName: "Inspeccionar payload de Port"
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              echo "============================================"
              echo "   PAYLOAD COMPLETO RECIBIDO DESDE PORT"
              echo "============================================"
              echo ""
              echo "--- PROPERTIES ---"
              echo "newRepoName   : ${{ parameters.port_trigger.properties.newRepoName }}"
              echo "projectName   : ${{ parameters.port_trigger.properties.projectName }}"
              echo "repoTemplate  : ${{ parameters.port_trigger.properties.repoTemplate }}"
              echo "repoVisibility: ${{ parameters.port_trigger.properties.repoVisibility }}"
              echo ""
              echo "--- PORT CONTEXT ---"
              echo "runId: ${{ parameters.port_trigger.port_context.runId }}"
              echo ""
              echo "============================================"
            displayName: "Imprimir todos los parámetros recibidos"

  - stage: Pipeline
    displayName: "Creación de repositorio"
    dependsOn: Diagnostico
    jobs:
      - template: jobs/prerequisitos.yml

      - template: jobs/validacion.yml
        parameters:
          newRepoName: ${{ parameters.port_trigger.properties.newRepoName }}
          projectName: ${{ parameters.port_trigger.properties.projectName }}
          repoTemplate: ${{ parameters.port_trigger.properties.repoTemplate }}

      - template: jobs/creacion-repositorio.yml
        parameters:
          newRepoName: ${{ parameters.port_trigger.properties.newRepoName }}
          repoVisibility: ${{ parameters.port_trigger.properties.repoVisibility }}

      - template: jobs/aplicar-template.yml
        parameters:
          projectName: ${{ parameters.port_trigger.properties.projectName }}
          repoTemplate: ${{ parameters.port_trigger.properties.repoTemplate }}
          newRepoName: ${{ parameters.port_trigger.properties.newRepoName }}

      - template: jobs/proteccion-ramas.yml
      - template: jobs/resumen-final.yml

  - stage: update_run_success
    displayName: "Notificar éxito a Port"
    dependsOn: Pipeline
    condition: succeeded('Pipeline')
    jobs:
      - template: jobs/notificar-port.yml
        parameters:
          status: "SUCCESS"
          message: "Pipeline completed successfully!"
          runId: ${{ parameters.port_trigger.port_context.runId }}

  - stage: update_run_failed
    displayName: "Notificar fallo a Port"
    dependsOn: Pipeline
    condition: failed('Pipeline')
    jobs:
      - template: jobs/notificar-port.yml
        parameters:
          status: "FAILURE"
          message: "Pipeline failed!"
          runId: ${{ parameters.port_trigger.port_context.runId }}
