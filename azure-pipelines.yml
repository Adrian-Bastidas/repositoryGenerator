trigger: none

parameters:
  - name: repoTemplate
    displayName: "Selecciona el repositorio template"
    type: string
    default: springboot
    values:
      - springboot
      - react
      - ejemplo-repo

  - name: newRepoName
    displayName: "Nombre del nuevo repositorio"
    type: string
    default: "mi-nuevo-repo"

  - name: repoVisibility
    displayName: "Visibilidad del repositorio"
    type: string
    default: private
    values:
      - public
      - private

variables:
  - group: github-secrets
  - name: springbootRepo
    value: "Adrian-Bastidas/AqrGSprinboot"
  - name: reactRepo
    value: "Adrian-Bastidas/ArqGReact"
  - name: ejemploRepo
    value: "usuario/ejemplo-repo"
  - name: repoCreado
    value: "false"

pool:
  name: Default

steps:
  # ============================================================
  # 1. VALIDAR NOMBRE
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"
      $repoName = "${{ parameters.newRepoName }}"

      if ([string]::IsNullOrWhiteSpace($repoName)) { throw "Nombre vacío" }
      if ($repoName.Length -gt 100)                { throw "Nombre demasiado largo (máx 100 caracteres)" }
      if ($repoName -notmatch '^[a-zA-Z0-9._-]+$') { throw "Caracteres inválidos. Usa solo letras, números, punto, guion o guion bajo" }

      Write-Host "✅ Nombre válido: $repoName"
    displayName: "Validar nombre"

  # ============================================================
  # 2. SELECCIONAR TEMPLATE
  # ============================================================
  - powershell: |
      if ("${{ parameters.repoTemplate }}" -eq "springboot") {
        Write-Host "##vso[task.setvariable variable=templateRepo]$(springbootRepo)"
      } elseif ("${{ parameters.repoTemplate }}" -eq "react") {
        Write-Host "##vso[task.setvariable variable=templateRepo]$(reactRepo)"
      } else {
        Write-Host "##vso[task.setvariable variable=templateRepo]$(ejemploRepo)"
      }
      Write-Host "✅ Template seleccionado: ${{ parameters.repoTemplate }}"
    displayName: "Seleccionar template"

  # ============================================================
  # 3. DETECTAR SI SE PUEDE APLICAR PROTECCIÓN DE RAMAS
  # Cuenta Free + repo privado = protección no disponible por API
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"
      $esPrivado = ("${{ parameters.repoVisibility }}" -eq "private")

      if ($esPrivado) {
        Write-Host "##vso[task.logissue type=warning]⚠️  Cuenta GitHub Free + repo PRIVADO detectado."
        Write-Host "##vso[task.logissue type=warning]La protección de ramas NO está disponible para repos privados en cuentas gratuitas."
        Write-Host "##vso[task.logissue type=warning]El repositorio se creará correctamente pero SIN protección de ramas."
        Write-Host "##vso[task.logissue type=warning]Para habilitar protección, actualiza tu cuenta a GitHub Pro o haz el repo público."
        Write-Host "##vso[task.setvariable variable=aplicarProteccion]false"
      } else {
        Write-Host "✅ Repo público en cuenta Free: protección disponible vía Rulesets."
        Write-Host "##vso[task.setvariable variable=aplicarProteccion]true"
      }
    displayName: "Detectar disponibilidad de protección"

  # ============================================================
  # 4. CREAR REPOSITORIO
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"
      $headers = @{
        Authorization = "Bearer $(GITHUB_TOKEN)"
        Accept        = "application/vnd.github+json"
      }

      $isPrivate = ("${{ parameters.repoVisibility }}" -eq "private")

      $body = @{
        name      = "${{ parameters.newRepoName }}"
        private   = $isPrivate
        auto_init = $true
      } | ConvertTo-Json

      Write-Host "📦 Creando repositorio '${{ parameters.newRepoName }}' (privado: $isPrivate)..."

      try {
        $repo = Invoke-RestMethod `
          -Uri "https://api.github.com/user/repos" `
          -Method POST `
          -Headers $headers `
          -Body $body `
          -ContentType "application/json"

        Write-Host "##vso[task.setvariable variable=newRepoUrl]$($repo.clone_url)"
        Write-Host "##vso[task.setvariable variable=newRepoFullName]$($repo.full_name)"
        Write-Host "##vso[task.setvariable variable=repoCreado]true"
        Write-Host "✅ Repositorio creado: $($repo.full_name)"
      }
      catch {
        throw "No se pudo crear el repositorio. Detalle: $($_.Exception.Message)"
      }
    displayName: "Crear repositorio"

  # ============================================================
  # 5. SUBIR TEMPLATE Y CREAR RAMAS
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"
      $token    = "$(GITHUB_TOKEN)"
      $cloneUrl = "https://$token@github.com/$(newRepoFullName).git"

      Write-Host "📥 Clonando template: $(templateRepo)"
      git clone "https://$token@github.com/$(templateRepo).git" template
      if ($LASTEXITCODE -ne 0) { throw "Error al clonar el template" }

      Set-Location template

      Write-Host "🔗 Apuntando al nuevo repositorio..."
      git remote set-url origin $cloneUrl
      if ($LASTEXITCODE -ne 0) { throw "Error al cambiar el remote" }

      Write-Host "🌿 Subiendo rama main..."
      git checkout -B main
      git push origin main --force
      if ($LASTEXITCODE -ne 0) { throw "Error al hacer push de main" }

      Write-Host "🌿 Creando y subiendo rama develop..."
      git checkout -b develop
      git push origin develop
      if ($LASTEXITCODE -ne 0) { throw "Error al hacer push de develop" }

      Set-Location ..
      Write-Host "✅ Ramas main y develop subidas correctamente"

      Write-Host "⏳ Esperando 8 segundos para que GitHub indexe las ramas..."
      Start-Sleep -Seconds 8
    displayName: "Subir código y crear ramas"

  # ============================================================
  # 6. PROTEGER RAMAS — Solo repos públicos (cuenta Free)
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"

      if ("$(aplicarProteccion)" -ne "true") {
        Write-Host "⏭️ Protección de ramas omitida (repo privado en cuenta GitHub Free)."
        exit 0
      }

      $headers = @{
        Authorization = "Bearer $(GITHUB_TOKEN)"
        Accept        = "application/vnd.github+json"
      }

      function Protect-BranchWithRuleset {
        param(
          [string]$repoFullName,
          [string]$branchName,
          [hashtable]$headers
        )

        Write-Host "🛡️ Protegiendo '$branchName' con Rulesets..."

        $body = @{
          name        = "protect-$branchName"
          target      = "branch"
          enforcement = "active"
          conditions  = @{
            ref_name = @{
              include = @("refs/heads/$branchName")
              exclude = @()
            }
          }
          rules = @(
            @{
              type       = "pull_request"
              parameters = @{
                required_approving_review_count   = 1
                dismiss_stale_reviews_on_push     = $true
                require_code_owner_review         = $false
                require_last_push_approval        = $false
                required_review_thread_resolution = $false
              }
            },
            @{ type = "non_fast_forward" },
            @{ type = "deletion" }
          )
        } | ConvertTo-Json -Depth 10

        try {
          Invoke-RestMethod `
            -Uri "https://api.github.com/repos/$repoFullName/rulesets" `
            -Method POST `
            -Headers $headers `
            -Body $body `
            -ContentType "application/json" | Out-Null

          Write-Host "✅ Rama '$branchName' protegida correctamente"
        }
        catch {
          $statusCode = $_.Exception.Response.StatusCode.value__
          Write-Host "##vso[task.logissue type=warning]No se pudo proteger '$branchName' (HTTP $statusCode): $($_.Exception.Message)"
        }
      }

      Protect-BranchWithRuleset -repoFullName "$(newRepoFullName)" -branchName "main"    -headers $headers
      Protect-BranchWithRuleset -repoFullName "$(newRepoFullName)" -branchName "develop" -headers $headers
    displayName: "Proteger ramas (solo repos públicos)"

  # ============================================================
  # ROLLBACK — Solo si el pipeline falla
  # ============================================================
  - powershell: |
      Write-Host "⚠️ Pipeline fallido. Iniciando rollback..."
      if ("$(repoCreado)" -eq "true") {
        Write-Host "🗑️ Eliminando repositorio $(newRepoFullName)..."
        try {
          Invoke-RestMethod `
            -Uri "https://api.github.com/repos/$(newRepoFullName)" `
            -Method DELETE `
            -Headers @{ Authorization = "Bearer $(GITHUB_TOKEN)" }
          Write-Host "✅ Repositorio eliminado en rollback"
        }
        catch {
          Write-Host "##vso[task.logissue type=warning]No se pudo eliminar el repositorio en rollback: $($_.Exception.Message)"
        }
      } else {
        Write-Host "ℹ️ El repositorio no llegó a crearse, no hay rollback necesario."
      }
      exit 1
    condition: failed()
    displayName: "Rollback"

  # ============================================================
  # RESUMEN FINAL
  # ============================================================
  - powershell: |
      $proteccion = if ("$(aplicarProteccion)" -eq "true") {
        "Aplicada via Rulesets"
      } else {
        "No disponible (repo privado en cuenta GitHub Free)"
      }

      Write-Host "========================================"
      Write-Host "✅ Repositorio creado y configurado"
      Write-Host "📦 Template    : ${{ parameters.repoTemplate }}"
      Write-Host "🔒 Visibilidad : ${{ parameters.repoVisibility }}"
      Write-Host "🌿 Ramas       : main, develop"
      Write-Host "🛡️ Protección  : $proteccion"
      Write-Host "🔗 URL         : $(newRepoUrl)"
      Write-Host "========================================"
    condition: succeeded()
    displayName: "Resumen final"
