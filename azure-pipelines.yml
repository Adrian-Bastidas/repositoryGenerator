trigger: none

parameters:
  - name: repoTemplate
    displayName: "Selecciona el repositorio template"
    type: string
    default: springboot
    values:
      - springboot
      - react
      - angular
      - node

  - name: newRepoName
    displayName: "Nombre del nuevo repositorio (ej: mi-proyecto-api)"
    type: string
    default: "mi-nuevo-repo"

  - name: projectName
    displayName: "Nombre del proyecto (ej: MiProyectoApi)"
    type: string
    default: "MiProyecto"

  - name: repoVisibility
    displayName: "Visibilidad del repositorio"
    type: string
    default: private
    values:
      - public
      - private

variables:
  - group: github-secrets
  - name: springbootRepo
    value: "Adrian-Bastidas/AqrGSprinboot"
  - name: reactRepo
    value: "Adrian-Bastidas/ArqGReact"
  - name: angularRepo
    value: "Adrian-Bastidas/ArqGAngular"
  - name: nodeRepo
    value: "Adrian-Bastidas/ArqGNode"

# ==============================================================
# JOB 0 — PREREQUISITOS
# ==============================================================
jobs:
  - job: Prerequisitos
    pool:
      name: Default
    steps:
      - powershell: |
          $ErrorActionPreference = "Stop"
          $python = (Get-Command python).Source
          & $python -m pip install --upgrade cookiecutter --quiet
          Write-Host "##vso[task.setvariable variable=PYTHON_EXE;isOutput=true]$python"
        name: SetupPython

  # ==============================================================
  # JOB 1 — VALIDACIÓN
  # ==============================================================
  - job: Validacion
    dependsOn: Prerequisitos
    pool:
      name: Default
    steps:
      - powershell: |
          switch ("${{ parameters.repoTemplate }}") {
            "springboot" { $tpl = "$(springbootRepo)" }
            "react"      { $tpl = "$(reactRepo)" }
            "angular"    { $tpl = "$(angularRepo)" }
            "node"       { $tpl = "$(nodeRepo)" }
          }
          Write-Host "##vso[task.setvariable variable=templateRepo;isOutput=true]$tpl"
        name: SelectTemplate

  # ==============================================================
  # JOB 2 — CREAR REPO
  # ==============================================================
  - job: CreacionRepositorio
    dependsOn: Validacion
    pool:
      name: Default
    variables:
      templateRepo: $[ dependencies.Validacion.outputs['SelectTemplate.templateRepo'] ]
    steps:
      - powershell: |
          $headers = @{
            Authorization = "Bearer $(GITHUB_TOKEN)"
            Accept = "application/vnd.github+json"
          }

          $body = @{
            name    = "${{ parameters.newRepoName }}"
            private = ("${{ parameters.repoVisibility }}" -eq "private")
          } | ConvertTo-Json

          $repo = Invoke-RestMethod `
            -Uri "https://api.github.com/user/repos" `
            -Method POST `
            -Headers $headers `
            -Body $body `
            -ContentType "application/json"

          Write-Host "##vso[task.setvariable variable=newRepoUrl;isOutput=true]$($repo.clone_url)"
          Write-Host "##vso[task.setvariable variable=newRepoFullName;isOutput=true]$($repo.full_name)"
        name: CrearRepo

  # ==============================================================
  # JOB 3 — COOKIECUTTER + PUSH
  # ==============================================================
  - job: AplicarTemplate
    dependsOn:
      - Prerequisitos
      - Validacion
      - CreacionRepositorio
    pool:
      name: Default
    variables:
      PYTHON_EXE: $[ dependencies.Prerequisitos.outputs['SetupPython.PYTHON_EXE'] ]
      templateRepo: $[ dependencies.Validacion.outputs['SelectTemplate.templateRepo'] ]
      newRepoFullName: $[ dependencies.CreacionRepositorio.outputs['CrearRepo.newRepoFullName'] ]
    steps:
      - checkout: self

      - powershell: |
          $ErrorActionPreference = "Stop"

          $python = "$(PYTHON_EXE)"
          $token  = "$(GITHUB_TOKEN)"

          $templateDir = "$(Agent.TempDirectory)/template"
          $outputDir   = "$(Agent.TempDirectory)/output"

          git clone "https://$token@github.com/$(templateRepo).git" $templateDir
          Copy-Item "$(Build.SourcesDirectory)/cookiecutter.json" "$templateDir/cookiecutter.json"

          $extraContext = @{
            project_name = "${{ parameters.projectName }}"
          } | ConvertTo-Json -Compress

          & $python -m cookiecutter $templateDir `
            --no-input `
            --output-dir $outputDir `
            --overwrite-if-exists `
            --extra-context "$extraContext"

          $generated = Get-ChildItem $outputDir -Directory | Select-Object -First 1

          Set-Location $generated.FullName
          git init
          git config user.name  "Azure Pipeline"
          git config user.email "pipeline@azure.local"
          git remote add origin "https://$token@github.com/$(newRepoFullName).git"

          git checkout -B main
          git add .
          git commit -m "feat: initial structure from template"
          git push origin main --force

          git checkout -b develop
          git push origin develop
        displayName: "Aplicar Cookiecutter y subir código"

  # ==============================================================
  # JOB 4 — RESUMEN
  # ==============================================================
  - job: Resumen
    dependsOn: AplicarTemplate
    pool:
      name: Default
    steps:
      - powershell: |
          Write-Host "✅ Repo creado:"
          Write-Host "👉 https://github.com/$(newRepoFullName)"
