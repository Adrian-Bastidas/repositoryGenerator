trigger: none

parameters:
  - name: repoTemplate
    displayName: "Selecciona el repositorio template"
    type: string
    default: springboot
    values:
      - springboot
      - react
      - ejemplo-repo

  - name: newRepoName
    displayName: "Nombre del nuevo repositorio"
    type: string
    default: "mi-nuevo-repo"

  - name: repoVisibility
    displayName: "Visibilidad del repositorio"
    type: string
    default: private
    values:
      - public
      - private

variables:
  - group: github-secrets
  - name: springbootRepo
    value: "Adrian-Bastidas/AqrGSprinboot"
  - name: reactRepo
    value: "Adrian-Bastidas/ArqGReact"
  - name: ejemploRepo
    value: "usuario/ejemplo-repo"
  - name: repoCreado
    value: "false"

pool:
  name: Default

steps:
  # ============================================================
  # 1. VALIDAR NOMBRE
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"
      $repoName = "${{ parameters.newRepoName }}"

      if ([string]::IsNullOrWhiteSpace($repoName)) { throw "Nombre vacío" }
      if ($repoName.Length -gt 100) { throw "Nombre demasiado largo" }
      if ($repoName -notmatch '^[a-zA-Z0-9._-]+$') { throw "Caracteres inválidos" }
      if ($repoName -match '\s') { throw "No se permiten espacios" }

      Write-Host "✅ Nombre válido"
    displayName: "Validar nombre"

  # ============================================================
  # 2. SELECCIONAR TEMPLATE
  # ============================================================
  - powershell: |
      if ("${{ parameters.repoTemplate }}" -eq "springboot") {
        Write-Host "##vso[task.setvariable variable=templateRepo]$(springbootRepo)"
      } elseif ("${{ parameters.repoTemplate }}" -eq "react") {
        Write-Host "##vso[task.setvariable variable=templateRepo]$(reactRepo)"
      } else {
        Write-Host "##vso[task.setvariable variable=templateRepo]$(ejemploRepo)"
      }
    displayName: "Seleccionar template"

  # ============================================================
  # 3. CREAR REPOSITORIO
  # ============================================================
  - powershell: |
      $headers = @{
        Authorization = "Bearer $(GITHUB_TOKEN)"
        Accept = "application/vnd.github+json"
      }

      $body = @{
        name = "${{ parameters.newRepoName }}"
        private = ("${{ parameters.repoVisibility }}" -eq "private")
        auto_init = $true
      } | ConvertTo-Json

      $res = Invoke-RestMethod `
        -Uri "https://api.github.com/user/repos" `
        -Method POST `
        -Headers $headers `
        -Body $body `
        -ContentType "application/json"

      Write-Host "##vso[task.setvariable variable=newRepoUrl]$($res.clone_url)"
      Write-Host "##vso[task.setvariable variable=newRepoFullName]$($res.full_name)"
      Write-Host "##vso[task.setvariable variable=repoCreado]true"
    displayName: "Crear repositorio"

  # ============================================================
  # 4. COPIAR TEMPLATE Y CREAR RAMAS
  # ============================================================
  - powershell: |
      $token = "$(GITHUB_TOKEN)"
      git clone "https://$token@github.com/$(templateRepo).git" template
      cd template
      git remote set-url origin "$(newRepoUrl)" -replace "https://","https://$token@"
      git checkout -B main
      git push origin main --force
      git checkout -b develop
      git push origin develop
    displayName: "Subir código y ramas"

  # ============================================================
  # 5. RULESET PARA MAIN
  # ============================================================
  - powershell: |
      Start-Sleep 5

      $headers = @{
        Authorization = "Bearer $(GITHUB_TOKEN)"
        Accept = "application/vnd.github+json"
      }

      $body = @{
        name = "protect-main"
        target = "branch"
        enforcement = "active"
        conditions = @{
          ref_name = @{
            include = @("refs/heads/main")
            exclude = @()
          }
        }
        rules = @(
          @{
            type = "pull_request"
            parameters = @{
              required_approving_review_count = 1
              dismiss_stale_reviews = $true
            }
          },
          @{ type = "non_fast_forward" },
          @{ type = "deletion" }
        )
      } | ConvertTo-Json -Depth 10

      Invoke-RestMethod `
        -Uri "https://api.github.com/repos/$(newRepoFullName)/rulesets" `
        -Method POST `
        -Headers $headers `
        -Body $body `
        -ContentType "application/json"
    displayName: "Ruleset main"

  # ============================================================
  # 6. RULESET PARA DEVELOP
  # ============================================================
  - powershell: |
      $headers = @{
        Authorization = "Bearer $(GITHUB_TOKEN)"
        Accept = "application/vnd.github+json"
      }

      $body = @{
        name = "protect-develop"
        target = "branch"
        enforcement = "active"
        conditions = @{
          ref_name = @{
            include = @("refs/heads/develop")
            exclude = @()
          }
        }
        rules = @(
          @{
            type = "pull_request"
            parameters = @{
              required_approving_review_count = 1
              dismiss_stale_reviews = $true
            }
          },
          @{ type = "non_fast_forward" },
          @{ type = "deletion" }
        )
      } | ConvertTo-Json -Depth 10

      Invoke-RestMethod `
        -Uri "https://api.github.com/repos/$(newRepoFullName)/rulesets" `
        -Method POST `
        -Headers $headers `
        -Body $body `
        -ContentType "application/json"
    displayName: "Ruleset develop"

  # ============================================================
  # ROLLBACK
  # ============================================================
  - powershell: |
      if ("$(repoCreado)" -eq "true") {
        Invoke-RestMethod `
          -Uri "https://api.github.com/repos/$(newRepoFullName)" `
          -Method DELETE `
          -Headers @{ Authorization = "Bearer $(GITHUB_TOKEN)" }
      }
      exit 1
    condition: failed()
    displayName: "Rollback"

  # ============================================================
  # RESUMEN
  # ============================================================
  - powershell: |
      Write-Host "✅ Repo creado y protegido"
      Write-Host "🔗 $(newRepoUrl)"
      Write-Host "🌿 main / develop protegidas por Rulesets"
    condition: succeeded()
    displayName: "Resumen final"
