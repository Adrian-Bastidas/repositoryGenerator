trigger: none

parameters:
  - name: repoOption
    displayName: "Selecciona el repositorio"
    type: string
    default: springboot
    values:
      - springboot
      - react
      - ejemplo-repo

variables:
  springbootRepo: "https://github.com/Adrian-Bastidas/AqrGSprinboot"
  reactRepo: "https://github.com/Adrian-Bastidas/ArqGReact"
  ejemploRepo: "https://github.com/usuario/ejemplo-repo"

pool:
  name: Default

steps:
  - pwsh: |
      Write-Host "Opción seleccionada: ${{ parameters.repoOption }}"

      if ("${{ parameters.repoOption }}" -eq "springboot") {
          Write-Host "Repositorio: $(springbootRepo)"
      }
      elseif ("${{ parameters.repoOption }}" -eq "react") {
          Write-Host "Repositorio: $(reactRepo)"
      }
      elseif ("${{ parameters.repoOption }}" -eq "ejemplo-repo") {
          Write-Host "Repositorio: $(ejemploRepo)"
      }
    displayName: "Imprimir repositorio seleccionado"
