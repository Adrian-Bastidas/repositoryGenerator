trigger: none

parameters:
  - name: repoTemplate
    displayName: "Selecciona el repositorio template"
    type: string
    default: springboot
    values:
      - springboot
      - react
      - angular
      - node

  - name: newRepoName
    displayName: "Nombre del nuevo repositorio"
    type: string
    default: "mi-nuevo-repo"

  - name: repoVisibility
    displayName: "Visibilidad del repositorio"
    type: string
    default: private
    values:
      - public
      - private

variables:
  - group: github-secrets
  - name: springbootRepo
    value: "Adrian-Bastidas/AqrGSprinboot"
  - name: reactRepo
    value: "Adrian-Bastidas/ArqGReact"
  - name: angularRepo
    value: "Adrian-Bastidas/ArqGAngular"
  - name: nodeRepo
    value: "Adrian-Bastidas/ArqGNode"
  - name: githubUser
    value: "Adrian-Bastidas"
  - name: repoCreado
    value: "false"
  - name: codigoSubido
    value: "false"
  - name: mainProtegida
    value: "false"

pool:
  name: Default

steps:
  - powershell: |
      $token = "$(GITHUB_TOKEN)"
      Write-Host "Longitud del token: $($token.Length)"
      Write-Host "Primeros 4 caracteres: $($token.Substring(0, [Math]::Min(4, $token.Length)))"
      Write-Host "Es nulo o vacío: $([string]::IsNullOrWhiteSpace($token))"
      Write-Host "Valor literal sin expandir: $(GITHUB_TOKEN)"
    displayName: "DEBUG — Ver estado del token"

  # ============================================================
  # 0. PREFLIGHT — Verificar herramientas, permisos y tokens
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"
      $errores = @()

      Write-Host "========================================================"
      Write-Host "🔍 PREFLIGHT — Verificación previa al pipeline"
      Write-Host "========================================================"

      # --- Verificación 1: Git instalado ---
      Write-Host "`n🔧 Verificando herramientas del agente..."
      try {
          $gitVersion = git --version
          if ($LASTEXITCODE -ne 0) { throw "Git no responde correctamente." }
          Write-Host "   ✅ Git disponible: $gitVersion"
      }
      catch {
          $errores += "Git no está instalado o no está en el PATH del agente."
      }

      # --- Verificación 2: El token existe y no está vacío ---
      Write-Host "`n🔑 Verificando token de GitHub..."
      $token = "$(GITHUB_TOKEN)"
      if ([string]::IsNullOrWhiteSpace($token) -or $token -eq "`$(GITHUB_TOKEN)") {
          $errores += "GITHUB_TOKEN está vacío o no fue inyectado. Verifica el Variable Group 'github-secrets' en Azure DevOps."
      }
      else {
          Write-Host "   ✅ GITHUB_TOKEN presente (longitud: $($token.Length) caracteres)"
      }

      # --- Verificación 3: El token es válido contra la API de GitHub ---
      Write-Host "`n🌐 Verificando autenticación con GitHub..."
      if (-not [string]::IsNullOrWhiteSpace($token) -and $token -ne "`$(GITHUB_TOKEN)") {
          try {
              $headers = @{
                  Authorization = "Bearer $token"
                  Accept        = "application/vnd.github+json"
              }

              $userResponse = Invoke-RestMethod `
                  -Uri "https://api.github.com/user" `
                  -Headers $headers

              Write-Host "   ✅ Token válido — Usuario autenticado: $($userResponse.login)"
              Write-Host "   ℹ️  Tipo de cuenta: $($userResponse.type)"
          }
          catch {
              $errores += "El token de GitHub no es válido o está expirado. Error: $($_.Exception.Message)"
          }
      }

      # --- Verificación 4: Scopes del token (permisos) ---
      Write-Host "`n🛡️  Verificando scopes (permisos) del token..."
      if (-not [string]::IsNullOrWhiteSpace($token) -and $token -ne "`$(GITHUB_TOKEN)") {
          try {
              $headers = @{
                  Authorization = "Bearer $token"
                  Accept        = "application/vnd.github+json"
              }

              $webResponse = Invoke-WebRequest `
                  -Uri "https://api.github.com/user" `
                  -Headers $headers

              $scopes = $webResponse.Headers["X-OAuth-Scopes"]

              if ([string]::IsNullOrWhiteSpace($scopes)) {
                  Write-Host "   ⚠️  No se pudieron leer los scopes (puede ser un Fine-grained token)."
                  Write-Host "   ℹ️  Si usas Fine-grained token, asegúrate de tener: Contents (RW), Metadata (R), Administration (RW)"
              }
              else {
                  Write-Host "   ℹ️  Scopes detectados: $scopes"

                  $scopeList = $scopes -split ",\s*"

                  # Verificar scope 'repo' (requerido para crear repos y push)
                  if ($scopeList -notcontains "repo") {
                      $errores += "El token NO tiene el scope 'repo'. Es necesario para crear repositorios y hacer push."
                  } else {
                      Write-Host "   ✅ Scope 'repo' presente"
                  }

                  # Verificar scope 'delete_repo' (requerido para rollback)
                  if ($scopeList -notcontains "delete_repo") {
                      $errores += "El token NO tiene el scope 'delete_repo'. Es necesario para el rollback automático."
                  } else {
                      Write-Host "   ✅ Scope 'delete_repo' presente"
                  }
              }
          }
          catch {
              $errores += "No se pudo verificar los scopes del token. Error: $($_.Exception.Message)"
          }
      }

      # --- Verificación 5: Acceso a los repos template ---
      Write-Host "`n📦 Verificando acceso a los repositorios template..."
      $templates = @(
          "Adrian-Bastidas/AqrGSprinboot",
          "Adrian-Bastidas/ArqGReact",
          "Adrian-Bastidas/ArqGAngular",
          "Adrian-Bastidas/ArqGNode"
      )

      if (-not [string]::IsNullOrWhiteSpace($token) -and $token -ne "`$(GITHUB_TOKEN)") {
          $headers = @{
              Authorization = "Bearer $token"
              Accept        = "application/vnd.github+json"
          }

          foreach ($repo in $templates) {
              try {
                  $repoInfo = Invoke-RestMethod `
                      -Uri "https://api.github.com/repos/$repo" `
                      -Headers $headers

                  Write-Host "   ✅ Acceso OK: $repo ($($repoInfo.visibility))"
              }
              catch {
                  $errores += "No se puede acceder al repo template '$repo'. Verifica que existe y que el token tiene acceso. Error: $($_.Exception.Message)"
              }
          }
      }

      # --- Verificación 6: Permisos de admin en el usuario (necesario para branch protection) ---
      Write-Host "`n🔐 Verificando capacidad de aplicar branch protection rules..."
      Write-Host "   ℹ️  Las branch protection rules requieren que el token tenga scope 'repo' completo"
      Write-Host "      y que el usuario sea OWNER o ADMIN del repositorio donde se aplicarán."
      Write-Host "   ℹ️  Si el pipeline falla en 403 al proteger ramas, actualiza el PAT en:"
      Write-Host "      GitHub → Settings → Developer settings → Personal access tokens"
      Write-Host "      Scopes necesarios: ✅ repo (completo)  ✅ delete_repo"

      # --- Resultado final del preflight ---
      Write-Host "`n========================================================"
      if ($errores.Count -gt 0) {
          Write-Host "##vso[task.logissue type=error]❌ PREFLIGHT FALLIDO — Se encontraron $($errores.Count) problema(s):"
          foreach ($e in $errores) {
              Write-Host "##vso[task.logissue type=error]   → $e"
          }
          Write-Host "##vso[task.logissue type=error]Corrige los problemas anteriores antes de volver a ejecutar el pipeline."
          throw "Preflight fallido. El pipeline no continuará hasta que todos los checks pasen."
      }
      else {
          Write-Host "✅ PREFLIGHT EXITOSO — Todas las verificaciones pasaron."
          Write-Host "========================================================"
      }
    displayName: "PREFLIGHT — Verificar herramientas, permisos y tokens"

  # ============================================================
  # 1. VALIDAR NOMBRE
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"
      $repoName = "${{ parameters.newRepoName }}"

      Write-Host "Validando nombre: '$repoName'"

      if ([string]::IsNullOrWhiteSpace($repoName)) {
          throw "El nombre del repositorio no puede estar vacío."
      }
      if ($repoName.Length -gt 100) {
          throw "El nombre excede los 100 caracteres permitidos por GitHub. Longitud actual: $($repoName.Length)"
      }
      if ($repoName -notmatch '^[a-zA-Z0-9._-]+$') {
          throw "El nombre '$repoName' contiene caracteres no permitidos. Solo se permiten: letras (a-z, A-Z), números (0-9), guiones (-), guiones bajos (_) y puntos (.)"
      }
      if ($repoName.StartsWith('.') -or $repoName.EndsWith('.')) {
          throw "El nombre no puede empezar ni terminar con un punto (.)"
      }
      if ($repoName.StartsWith('-') -or $repoName.EndsWith('-')) {
          throw "El nombre no puede empezar ni terminar con un guión (-)"
      }
      if ($repoName -match '\s') {
          throw "El nombre no puede contener espacios. Usa guiones (-) o guiones bajos (_) en su lugar."
      }

      $reservedNames = @(
          ".", "..", "CON", "PRN", "AUX", "NUL",
          "COM1","COM2","COM3","COM4","COM5","COM6","COM7","COM8","COM9",
          "LPT1","LPT2","LPT3","LPT4","LPT5","LPT6","LPT7","LPT8","LPT9"
      )
      if ($reservedNames -contains $repoName.ToUpper()) {
          throw "El nombre '$repoName' es un nombre reservado y no puede usarse."
      }
      if ($repoName -match '^\.+$') {
          throw "El nombre no puede estar compuesto únicamente por puntos."
      }

      Write-Host "✅ Nombre '$repoName' válido."
    displayName: "Validar nombre del repositorio"

  # ============================================================
  # 2. SELECCIONAR TEMPLATE
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"
      $template = "${{ parameters.repoTemplate }}"

      if ($template -eq "springboot") {
          Write-Host "##vso[task.setvariable variable=templateRepo]$(springbootRepo)"
      }
      elseif ($template -eq "react") {
          Write-Host "##vso[task.setvariable variable=templateRepo]$(reactRepo)"
      }
      elseif ($template -eq "angular") {
          Write-Host "##vso[task.setvariable variable=templateRepo]$(angularRepo)"
      }
      elseif ($template -eq "node") {
          Write-Host "##vso[task.setvariable variable=templateRepo]$(nodeRepo)"
      }
      else {
          throw "Template '$template' no reconocido."
      }

      Write-Host "✅ Template seleccionado: $template"
    displayName: "Seleccionar template"

  # ============================================================
  # 3. CREAR REPOSITORIO EN GITHUB
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"

      $headers = @{
          Authorization = "Bearer $(GITHUB_TOKEN)"
          Accept        = "application/vnd.github+json"
      }

      $isPrivate = "${{ parameters.repoVisibility }}" -eq "private"

      $body = @{
          name      = "${{ parameters.newRepoName }}"
          private   = $isPrivate
          auto_init = $true
      } | ConvertTo-Json

      Write-Host "Creando repositorio: ${{ parameters.newRepoName }} (${{ parameters.repoVisibility }})"

      try {
          $response = Invoke-RestMethod `
              -Uri "https://api.github.com/user/repos" `
              -Method POST `
              -Headers $headers `
              -Body $body `
              -ContentType "application/json"

          Write-Host "✅ Repositorio creado: $($response.html_url)"
          Write-Host "##vso[task.setvariable variable=newRepoUrl]$($response.clone_url)"
          Write-Host "##vso[task.setvariable variable=newRepoFullName]$($response.full_name)"
          Write-Host "##vso[task.setvariable variable=repoCreado]true"
      }
      catch {
          $errorDetail = $_.Exception.Message
          throw "No se pudo crear el repositorio en GitHub. Detalle: $errorDetail"
      }
    displayName: "Crear repositorio en GitHub"

  # ============================================================
  # 4. CLONAR TEMPLATE Y SUBIR CÓDIGO
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"

      $templateRepo     = "$(templateRepo)"
      $newRepoUrl       = "$(newRepoUrl)"
      $token            = "$(GITHUB_TOKEN)"
      $authenticatedUrl = $newRepoUrl -replace "https://", "https://$token@"

      try {
          Write-Host "Clonando template: $templateRepo"
          git clone "https://$token@github.com/$templateRepo.git" template-repo
          if ($LASTEXITCODE -ne 0) { throw "Error al clonar el repositorio template." }

          Set-Location template-repo

          git remote set-url origin $authenticatedUrl
          if ($LASTEXITCODE -ne 0) { throw "Error al configurar el remote origin." }

          git checkout -B main
          if ($LASTEXITCODE -ne 0) { throw "Error al crear rama main." }

          git push origin main --force
          if ($LASTEXITCODE -ne 0) { throw "Error al hacer push de main." }

          git checkout -b develop
          if ($LASTEXITCODE -ne 0) { throw "Error al crear rama develop." }

          git push origin develop
          if ($LASTEXITCODE -ne 0) { throw "Error al hacer push de develop." }

          Write-Host "##vso[task.setvariable variable=codigoSubido]true"
          Write-Host "✅ Ramas 'main' y 'develop' creadas correctamente"
      }
      catch {
          $errorDetail = $_.Exception.Message
          throw "Fallo al subir el código al nuevo repositorio. Detalle: $errorDetail"
      }
    displayName: "Copiar template y crear ramas"

  # ============================================================
  # 5. PROTEGER RAMA MAIN
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"

      $headers = @{
          Authorization = "Bearer $(GITHUB_TOKEN)"
          Accept        = "application/vnd.github+json"
      }

      $body = @{
          required_pull_request_reviews = @{
              required_approving_review_count = 1
              dismiss_stale_reviews           = $true
              require_code_owner_reviews      = $false
          }
          enforce_admins         = $true
          required_status_checks = $null
          restrictions           = $null
          allow_force_pushes     = $false
          allow_deletions        = $false
          block_creations        = $false
      } | ConvertTo-Json -Depth 5

      try {
          Write-Host "Aplicando protección a rama: main"

          Invoke-RestMethod `
              -Uri "https://api.github.com/repos/$(newRepoFullName)/branches/main/protection" `
              -Method PUT `
              -Headers $headers `
              -Body $body `
              -ContentType "application/json"

          Write-Host "##vso[task.setvariable variable=mainProtegida]true"
          Write-Host "✅ Rama main protegida"
      }
      catch {
          $errorDetail = $_.Exception.Message
          throw "No se pudo proteger la rama main. Detalle: $errorDetail"
      }
    displayName: "Proteger rama main"

  # ============================================================
  # 6. PROTEGER RAMA DEVELOP
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"

      $headers = @{
          Authorization = "Bearer $(GITHUB_TOKEN)"
          Accept        = "application/vnd.github+json"
      }

      $body = @{
          required_pull_request_reviews = @{
              required_approving_review_count = 1
              dismiss_stale_reviews           = $true
              require_code_owner_reviews      = $false
          }
          enforce_admins         = $true
          required_status_checks = $null
          restrictions           = $null
          allow_force_pushes     = $false
          allow_deletions        = $false
          block_creations        = $false
      } | ConvertTo-Json -Depth 5

      try {
          Write-Host "Aplicando protección a rama: develop"

          Invoke-RestMethod `
              -Uri "https://api.github.com/repos/$(newRepoFullName)/branches/develop/protection" `
              -Method PUT `
              -Headers $headers `
              -Body $body `
              -ContentType "application/json"

          Write-Host "✅ Rama develop protegida"
      }
      catch {
          $errorDetail = $_.Exception.Message
          throw "No se pudo proteger la rama develop. Detalle: $errorDetail"
      }
    displayName: "Proteger rama develop"

  # ============================================================
  # 7. VALIDAR GENERACIÓN EXITOSA
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"

      $headers = @{
          Authorization = "Bearer $(GITHUB_TOKEN)"
          Accept        = "application/vnd.github+json"
      }

      $repoFullName = "$(newRepoFullName)"
      $errores      = @()

      Write-Host "========================================"
      Write-Host "🔍 Iniciando validación del repositorio"
      Write-Host "========================================"

      # Validación 1: El repo tiene archivos
      Write-Host "`n📁 Validando contenido del repositorio..."
      try {
          $contents = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/$repoFullName/contents" `
              -Headers $headers

          if ($contents.Count -eq 0) {
              $errores += "El repositorio está vacío. El blueprint no se copió correctamente."
          }
          else {
              Write-Host "   ✅ El repositorio contiene $($contents.Count) archivo(s)/carpeta(s) en la raíz."
          }
      }
      catch {
          $errores += "No se pudo verificar el contenido. Detalle: $($_.Exception.Message)"
      }

      # Validación 2: Ramas main y develop existen
      Write-Host "`n🌿 Validando ramas..."
      foreach ($branch in @("main", "develop")) {
          try {
              Invoke-RestMethod `
                  -Uri "https://api.github.com/repos/$repoFullName/branches/$branch" `
                  -Headers $headers | Out-Null
              Write-Host "   ✅ Rama '$branch' existe."
          }
          catch {
              $errores += "La rama '$branch' no existe."
          }
      }

      # Validación 3: Protecciones activas
      Write-Host "`n🛡️  Validando protecciones de ramas..."
      foreach ($branch in @("main", "develop")) {
          try {
              $protection = Invoke-RestMethod `
                  -Uri "https://api.github.com/repos/$repoFullName/branches/$branch/protection" `
                  -Headers $headers

              if ($null -eq $protection.required_pull_request_reviews) {
                  $errores += "La rama '$branch' no tiene PR reviews requeridos."
              }
              else {
                  $approvals = $protection.required_pull_request_reviews.required_approving_review_count
                  Write-Host "   ✅ Rama '$branch' protegida — aprobaciones mínimas: $approvals"
              }

              if ($protection.allow_force_pushes.enabled -eq $true) {
                  $errores += "La rama '$branch' permite force push. Debería estar bloqueado."
              }
              else {
                  Write-Host "   ✅ Rama '$branch' — Force push bloqueado."
              }
          }
          catch {
              $errores += "No se pudo verificar protección de '$branch'. Detalle: $($_.Exception.Message)"
          }
      }

      Write-Host "`n========================================"
      if ($errores.Count -gt 0) {
          foreach ($e in $errores) {
              Write-Host "##vso[task.logissue type=error]   → $e"
          }
          throw "La validación falló con $($errores.Count) problema(s)."
      }
      else {
          Write-Host "✅ Todas las validaciones pasaron correctamente."
          Write-Host "========================================"
      }
    displayName: "Validar generación del repositorio"

  # ============================================================
  # ROLLBACK — Solo se ejecuta si algo falló
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"

      Write-Host "##vso[task.logissue type=error]❌ El pipeline falló. Iniciando rollback..."

      $headers = @{
          Authorization = "Bearer $(GITHUB_TOKEN)"
          Accept        = "application/vnd.github+json"
      }

      if ("$(repoCreado)" -eq "true") {
          Write-Host "🗑️  Eliminando repositorio: $(newRepoFullName)"
          try {
              Invoke-RestMethod `
                  -Uri "https://api.github.com/repos/$(newRepoFullName)" `
                  -Method DELETE `
                  -Headers $headers
              Write-Host "✅ Repositorio eliminado correctamente."
          }
          catch {
              Write-Host "##vso[task.logissue type=warning]⚠️ No se pudo eliminar el repositorio automáticamente."
              Write-Host "##vso[task.logissue type=warning]   Elimínalo manualmente en: https://github.com/$(newRepoFullName)"
          }
      }
      else {
          Write-Host "ℹ️  El repositorio no llegó a crearse. No hay nada que revertir."
      }

      $tempFolder = "$(Agent.BuildDirectory)\template-repo"
      if (Test-Path $tempFolder) {
          Remove-Item -Recurse -Force $tempFolder
          Write-Host "🧹 Carpeta temporal del agente limpiada."
      }

      Write-Host "##vso[task.logissue type=error]Pipeline detenido. Revisa los errores arriba."
      exit 1
    displayName: "ROLLBACK — Revertir cambios"
    condition: failed()

  # ============================================================
  # RESUMEN FINAL — Solo se ejecuta si todo fue exitoso
  # ============================================================
  - powershell: |
      Write-Host "============================================================"
      Write-Host "✅ PoC 1 completado — Repositorio generado y validado"
      Write-Host "============================================================"
      Write-Host "📦 Template usado    : ${{ parameters.repoTemplate }}"
      Write-Host "📁 Nuevo repo        : ${{ parameters.newRepoName }}"
      Write-Host "🔒 Visibilidad       : ${{ parameters.repoVisibility }}"
      Write-Host "🔗 URL               : $(newRepoUrl)"
      Write-Host "🌿 Ramas             : main ✅  develop ✅"
      Write-Host "🛡️  Protecciones     : main ✅  develop ✅"
      Write-Host "📁 Contenido         : Blueprint copiado ✅"
      Write-Host "------------------------------------------------------------"
      Write-Host "🔒 Reglas activas    :"
      Write-Host "   - Merge solo por Pull Request con 1 aprobación mínima"
      Write-Host "   - Aprobaciones inválidas si hay nuevos commits"
      Write-Host "   - Force push bloqueado"
      Write-Host "   - Eliminación de ramas bloqueada"
      Write-Host "   - Reglas aplican también a administradores"
      Write-Host "============================================================"
    displayName: "Resumen exitoso"
    condition: succeeded()
