trigger: none

parameters:
  - name: repoTemplate
    displayName: "Selecciona el repositorio template"
    type: string
    default: springboot
    values:
      - springboot
      - react
      - ejemplo-repo

  - name: newRepoName
    displayName: "Nombre del nuevo repositorio"
    type: string
    default: "mi-nuevo-repo"

  - name: repoVisibility
    displayName: "Visibilidad del repositorio"
    type: string
    default: private
    values:
      - public
      - private

variables:
  - group: github-secrets
  - name: springbootRepo
    value: "Adrian-Bastidas/AqrGSprinboot"
  - name: reactRepo
    value: "Adrian-Bastidas/ArqGReact"
  - name: ejemploRepo
    value: "usuario/ejemplo-repo"
  - name: repoCreado
    value: "false"

pool:
  name: Default

steps:
  # ============================================================
  # 1. VALIDAR NOMBRE
  # ============================================================
  - powershell: |
      $ErrorActionPreference = "Stop"
      $repoName = "${{ parameters.newRepoName }}"

      if ([string]::IsNullOrWhiteSpace($repoName)) { throw "Nombre vacío" }
      if ($repoName.Length -gt 100) { throw "Nombre demasiado largo" }
      if ($repoName -notmatch '^[a-zA-Z0-9._-]+$') { throw "Caracteres inválidos" }
      if ($repoName -match '\s') { throw "No se permiten espacios" }

      Write-Host "✅ Nombre válido"
    displayName: "Validar nombre"

  # ============================================================
  # 2. SELECCIONAR TEMPLATE
  # ============================================================
  - powershell: |
      if ("${{ parameters.repoTemplate }}" -eq "springboot") {
        Write-Host "##vso[task.setvariable variable=templateRepo]$(springbootRepo)"
      } elseif ("${{ parameters.repoTemplate }}" -eq "react") {
        Write-Host "##vso[task.setvariable variable=templateRepo]$(reactRepo)"
      } else {
        Write-Host "##vso[task.setvariable variable=templateRepo]$(ejemploRepo)"
      }
    displayName: "Seleccionar template"

  # ============================================================
  # 3. CREAR REPOSITORIO
  # ============================================================
  - powershell: |
      $headers = @{
        Authorization = "Bearer $(GITHUB_TOKEN)"
        Accept = "application/vnd.github+json"
      }

      $body = @{
        name = "${{ parameters.newRepoName }}"
        private = ("${{ parameters.repoVisibility }}" -eq "private")
        auto_init = $true
      } | ConvertTo-Json

      $repo = Invoke-RestMethod `
        -Uri "https://api.github.com/user/repos" `
        -Method POST `
        -Headers $headers `
        -Body $body `
        -ContentType "application/json"

      Write-Host "##vso[task.setvariable variable=newRepoUrl]$($repo.clone_url)"
      Write-Host "##vso[task.setvariable variable=newRepoFullName]$($repo.full_name)"
      Write-Host "##vso[task.setvariable variable=repoCreado]true"
    displayName: "Crear repositorio"

  # ============================================================
  # 4. SUBIR TEMPLATE Y CREAR RAMAS
  # ============================================================
  - powershell: |
      $token = "$(GITHUB_TOKEN)"
      git clone "https://$token@github.com/$(templateRepo).git" template
      cd template
      git remote set-url origin "$(newRepoUrl)" -replace "https://","https://$token@"
      git checkout -B main
      git push origin main --force
      git checkout -b develop
      git push origin develop
    displayName: "Subir código y ramas"

  # ============================================================
  # 5. DETECTAR MÉTODO DE PROTECCIÓN
  # ============================================================
  - powershell: |
      $headers = @{
        Authorization = "Bearer $(GITHUB_TOKEN)"
        Accept = "application/vnd.github+json"
      }

      $repo = Invoke-RestMethod `
        -Uri "https://api.github.com/repos/$(newRepoFullName)" `
        -Headers $headers

      if ($repo.private -eq $true) {
        Write-Host "ℹ️ Repo privado → Branch Protection legacy"
        Write-Host "##vso[task.setvariable variable=useRulesets]false"
      } else {
        Write-Host "ℹ️ Repo público → Rulesets"
        Write-Host "##vso[task.setvariable variable=useRulesets]true"
      }
    displayName: "Detectar método de protección"

  # ============================================================
  # 6. PROTEGER RAMA MAIN
  # ============================================================
  - powershell: |
      $headers = @{
        Authorization = "Bearer $(GITHUB_TOKEN)"
        Accept = "application/vnd.github+json"
      }

      if ("$(useRulesets)" -eq "true") {
        Write-Host "🛡️ Protegiendo main con RULESETS"

        $body = @{
          name = "protect-main"
          target = "branch"
          enforcement = "active"
          conditions = @{
            ref_name = @{
              include = @("refs/heads/main")
            }
          }
          rules = @(
            @{
              type = "pull_request"
              parameters = @{
                required_approving_review_count = 1
                dismiss_stale_reviews = $true
              }
            },
            @{ type = "non_fast_forward" },
            @{ type = "deletion" }
          )
        } | ConvertTo-Json -Depth 10

        Invoke-RestMethod `
          -Uri "https://api.github.com/repos/$(newRepoFullName)/rulesets" `
          -Method POST `
          -Headers $headers `
          -Body $body `
          -ContentType "application/json"

      } else {
        Write-Host "🛡️ Protegiendo main con BRANCH PROTECTION legacy"

        $body = @{
          required_pull_request_reviews = @{
            required_approving_review_count = 1
            dismiss_stale_reviews = $true
          }
          enforce_admins = $true
          allow_force_pushes = $false
          allow_deletions = $false
        } | ConvertTo-Json -Depth 5

        Invoke-RestMethod `
          -Uri "https://api.github.com/repos/$(newRepoFullName)/branches/main/protection" `
          -Method PUT `
          -Headers $headers `
          -Body $body `
          -ContentType "application/json"
      }
    displayName: "Proteger main"

  # ============================================================
  # 7. PROTEGER RAMA DEVELOP
  # ============================================================
  - powershell: |
      $headers = @{
        Authorization = "Bearer $(GITHUB_TOKEN)"
        Accept = "application/vnd.github+json"
      }

      if ("$(useRulesets)" -eq "true") {
        Write-Host "🛡️ Protegiendo develop con RULESETS"

        $body = @{
          name = "protect-develop"
          target = "branch"
          enforcement = "active"
          conditions = @{
            ref_name = @{
              include = @("refs/heads/develop")
            }
          }
          rules = @(
            @{
              type = "pull_request"
              parameters = @{
                required_approving_review_count = 1
                dismiss_stale_reviews = $true
              }
            },
            @{ type = "non_fast_forward" },
            @{ type = "deletion" }
          )
        } | ConvertTo-Json -Depth 10

        Invoke-RestMethod `
          -Uri "https://api.github.com/repos/$(newRepoFullName)/rulesets" `
          -Method POST `
          -Headers $headers `
          -Body $body `
          -ContentType "application/json"

      } else {
        Write-Host "🛡️ Protegiendo develop con BRANCH PROTECTION legacy"

        $body = @{
          required_pull_request_reviews = @{
            required_approving_review_count = 1
            dismiss_stale_reviews = $true
          }
          enforce_admins = $true
          allow_force_pushes = $false
          allow_deletions = $false
        } | ConvertTo-Json -Depth 5

        Invoke-RestMethod `
          -Uri "https://api.github.com/repos/$(newRepoFullName)/branches/develop/protection" `
          -Method PUT `
          -Headers $headers `
          -Body $body `
          -ContentType "application/json"
      }
    displayName: "Proteger develop"

  # ============================================================
  # ROLLBACK
  # ============================================================
  - powershell: |
      if ("$(repoCreado)" -eq "true") {
        Invoke-RestMethod `
          -Uri "https://api.github.com/repos/$(newRepoFullName)" `
          -Method DELETE `
          -Headers @{ Authorization = "Bearer $(GITHUB_TOKEN)" }
      }
      exit 1
    condition: failed()
    displayName: "Rollback"

  # ============================================================
  # RESUMEN
  # ============================================================
  - powershell: |
      Write-Host "===================================="
      Write-Host "✅ Repositorio creado y configurado"
      Write-Host "📦 Template: ${{ parameters.repoTemplate }}"
      Write-Host "🌿 Ramas: main, develop"
      Write-Host "🛡️ Protección aplicada automáticamente"
      Write-Host "🔗 URL: $(newRepoUrl)"
      Write-Host "===================================="
    condition: succeeded()
    displayName: "Resumen final"
