trigger: none

resources:
  webhooks:
    - webhook: port_trigger
      connection: port_trigger

variables:
  - group: github-secrets

  - name: REPO_TEMPLATE
    value: ${{ parameters.port_trigger.properties.repoTemplate }}

  - name: NEW_REPO_NAME
    value: ${{ parameters.port_trigger.properties.newRepoName }}

  - name: PROJECT_NAME
    value: ${{ parameters.port_trigger.properties.projectName }}

  - name: REPO_VISIBILITY
    value: ${{ parameters.port_trigger.properties.repoVisibility }}

  - name: RUN_ID
    value: ${{ parameters.port_trigger.port_context.runId }}

  - name: springbootRepo
    value: "Adrian-Bastidas/AqrGSprinboot"

  - name: reactRepo
    value: "Adrian-Bastidas/ArqGReact"

  - name: angularRepo
    value: "Adrian-Bastidas/ArqGAngular"

  - name: nodeRepo
    value: "Adrian-Bastidas/ArqGNode"

stages:
  # ==============================================================
  # STAGE PRINCIPAL — Todo el flujo de creación
  # ==============================================================
  - stage: Pipeline
    displayName: "Creación de repositorio"
    jobs:
      # ==============================================================
      # JOB 0 — Prerequisitos
      # ==============================================================
      - job: Prerequisitos
        displayName: "Job 0 · Prerequisitos — instalar herramientas"
        pool:
          name: Default
        steps:
          - bash: |
              set -e

              echo "🔍 Verificando git..."
              if ! command -v git &> /dev/null; then
                echo "git no encontrado, instalando..."
                sudo apt-get update -qq && sudo apt-get install -y git
              fi
              echo "✅ git: $(git --version)"

              echo "🔍 Buscando Python en el sistema..."
              PYTHON_EXE=""

              for candidate in python3.11 python3.12 python3.10 python3.9 python3 python; do
                if command -v "$candidate" &> /dev/null; then
                  ver=$("$candidate" --version 2>&1)
                  if echo "$ver" | grep -q "Python 3"; then
                    PYTHON_EXE=$(command -v "$candidate")
                    echo "✅ Python encontrado: $PYTHON_EXE — $ver"
                    break
                  fi
                fi
              done

              if [ -z "$PYTHON_EXE" ]; then
                echo "⚙️ Python no encontrado. Instalando Python 3.11..."
                sudo apt-get update -qq
                sudo apt-get install -y python3.11 python3.11-venv python3-pip
                PYTHON_EXE=$(command -v python3.11)
                echo "✅ Python instalado: $($PYTHON_EXE --version)"
              fi

              echo "##vso[task.setvariable variable=PYTHON_EXE;isOutput=true]$PYTHON_EXE"
            displayName: "Verificar / instalar Python"
            name: CheckPython

          - bash: |
              set -e
              PYTHON_EXE="$(CheckPython.PYTHON_EXE)"

              echo "🔍 Verificando pip con: $PYTHON_EXE"
              if ! $PYTHON_EXE -m pip --version &> /dev/null; then
                echo "pip no disponible, instalando..."
                sudo apt-get install -y python3-pip
              fi
              echo "✅ pip: $($PYTHON_EXE -m pip --version)"

              echo "🍪 Instalando / actualizando Cookiecutter..."
              $PYTHON_EXE -m pip install --upgrade cookiecutter --quiet
              echo "✅ Cookiecutter listo: $($PYTHON_EXE -m cookiecutter --version)"

              echo "##vso[task.setvariable variable=PYTHON_EXE;isOutput=true]$PYTHON_EXE"
            displayName: "Instalar Cookiecutter"
            name: InstalarCookiecutter

      # ==============================================================
      # JOB 1 — Validación y selección de template
      # ==============================================================
      - job: Validacion
        displayName: "Job 1 · Validación y selección de template"
        pool:
          name: Default
        dependsOn: Prerequisitos
        steps:
          - bash: |
              set -e

              REPO_NAME="$(NEW_REPO_NAME)"
              if [ -z "$REPO_NAME" ]; then echo "❌ Nombre de repositorio vacío"; exit 1; fi
              if [ ${#REPO_NAME} -gt 100 ]; then echo "❌ Nombre de repositorio demasiado largo (máx 100 caracteres)"; exit 1; fi
              if ! echo "$REPO_NAME" | grep -qE '^[a-zA-Z0-9._-]+$'; then echo "❌ Nombre de repositorio con caracteres inválidos."; exit 1; fi
              echo "✅ Nombre de repositorio válido: $REPO_NAME"

              PROJECT_NAME="$(PROJECT_NAME)"
              if [ -z "$PROJECT_NAME" ]; then echo "❌ Nombre de proyecto vacío"; exit 1; fi
              if [ ${#PROJECT_NAME} -gt 100 ]; then echo "❌ Nombre de proyecto demasiado largo (máx 100 caracteres)"; exit 1; fi
              echo "✅ Nombre de proyecto válido: $PROJECT_NAME"
            displayName: "Validar parámetros de entrada"

          - bash: |
              set -e

              case "$(REPO_TEMPLATE)" in
                "springboot") echo "##vso[task.setvariable variable=templateRepo;isOutput=true]$(springbootRepo)" ;;
                "react")      echo "##vso[task.setvariable variable=templateRepo;isOutput=true]$(reactRepo)" ;;
                "angular")    echo "##vso[task.setvariable variable=templateRepo;isOutput=true]$(angularRepo)" ;;
                "node")       echo "##vso[task.setvariable variable=templateRepo;isOutput=true]$(nodeRepo)" ;;
                *)            echo "❌ Template no reconocido: $(REPO_TEMPLATE)"; exit 1 ;;
              esac

              echo "✅ Template seleccionado: $(REPO_TEMPLATE)"
            displayName: "Seleccionar template"
            name: SeleccionTemplate

      # ==============================================================
      # JOB 2 — Creación del repositorio en GitHub
      # ==============================================================
      - job: CreacionRepositorio
        displayName: "Job 2 · Creación del repositorio en GitHub"
        pool:
          name: Default
        dependsOn: Validacion
        variables:
          templateRepo: $[ dependencies.Validacion.outputs['SeleccionTemplate.templateRepo'] ]
          repoCreado: "false"
        steps:
          - bash: |
              set -e

              IS_PRIVATE=true
              if [ "$(REPO_VISIBILITY)" = "public" ]; then IS_PRIVATE=false; fi

              echo "📦 Creando repositorio '$(NEW_REPO_NAME)' (privado: $IS_PRIVATE)..."

              RESPONSE=$(curl -s -w "\n%{http_code}" \
                -X POST \
                -H "Authorization: Bearer $(GITHUB_TOKEN)" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                -d "{\"name\": \"$(NEW_REPO_NAME)\", \"private\": $IS_PRIVATE, \"auto_init\": true}" \
                "https://api.github.com/user/repos")

              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              BODY=$(echo "$RESPONSE" | head -n-1)

              if [ "$HTTP_CODE" != "201" ]; then
                echo "❌ Error al crear repositorio (HTTP $HTTP_CODE): $BODY"
                exit 1
              fi

              CLONE_URL=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['clone_url'])")
              FULL_NAME=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['full_name'])")

              echo "##vso[task.setvariable variable=newRepoUrl;isOutput=true]$CLONE_URL"
              echo "##vso[task.setvariable variable=newRepoFullName;isOutput=true]$FULL_NAME"
              echo "##vso[task.setvariable variable=repoCreado]true"
              echo "✅ Repositorio creado: $FULL_NAME"
            displayName: "Crear repositorio en GitHub"
            name: CrearRepo

          - bash: |
              echo "⚠️ Fallo al crear el repositorio. Iniciando rollback..."
              if [ "$(repoCreado)" = "true" ]; then
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                  -X DELETE \
                  -H "Authorization: Bearer $(GITHUB_TOKEN)" \
                  "https://api.github.com/repos/$(CrearRepo.newRepoFullName)")

                if [ "$HTTP_CODE" = "204" ]; then
                  echo "✅ Repositorio eliminado en rollback"
                else
                  echo "##vso[task.logissue type=warning]No se pudo eliminar el repositorio en rollback (HTTP $HTTP_CODE)"
                fi
              else
                echo "ℹ️ El repositorio no llegó a crearse, no hay rollback necesario."
              fi
              exit 1
            condition: failed()
            displayName: "Rollback — eliminar repo si hubo error"

      # ==============================================================
      # JOB 3 — Aplicar Cookiecutter y subir código
      # ==============================================================
      - job: AplicarTemplateYSubirCodigo
        displayName: "Job 3 · Aplicar Cookiecutter y subir código"
        pool:
          name: Default
        dependsOn:
          - Prerequisitos
          - Validacion
          - CreacionRepositorio
        variables:
          PYTHON_EXE: $[ dependencies.Prerequisitos.outputs['InstalarCookiecutter.PYTHON_EXE'] ]
          templateRepo: $[ dependencies.Validacion.outputs['SeleccionTemplate.templateRepo'] ]
          newRepoUrl: $[ dependencies.CreacionRepositorio.outputs['CrearRepo.newRepoUrl'] ]
          newRepoFullName: $[ dependencies.CreacionRepositorio.outputs['CrearRepo.newRepoFullName'] ]
        steps:
          - checkout: self
            displayName: "Checkout del repo del pipeline"

          - bash: |
              set -e
              TOKEN="$(GITHUB_TOKEN)"
              PYTHON="$(PYTHON_EXE)"

              TEMPLATE_CLONE_DIR="$(Agent.TempDirectory)/template-raw"
              CC_TEMPLATE_DIR="$(Agent.TempDirectory)/cc-template"
              OUTPUT_DIR="$(Agent.TempDirectory)/cookiecutter-output"

              echo "📥 Clonando template: $(templateRepo)"
              git clone "https://$TOKEN@github.com/$(templateRepo).git" "$TEMPLATE_CLONE_DIR"

              mkdir -p "$CC_TEMPLATE_DIR/{{cookiecutter.project_name}}"

              # Copiar archivos del template (sin .git)
              find "$TEMPLATE_CLONE_DIR" -mindepth 1 -maxdepth 1 ! -name '.git' \
                -exec cp -r {} "$CC_TEMPLATE_DIR/{{cookiecutter.project_name}}/" \;

              # Escribir cookiecutter.json
              echo "{\"project_name\": \"$(PROJECT_NAME)\"}" > "$CC_TEMPLATE_DIR/cookiecutter.json"

              echo "🍪 Ejecutando Cookiecutter..."
              mkdir -p "$OUTPUT_DIR"

              $PYTHON -m cookiecutter "$CC_TEMPLATE_DIR" \
                --no-input \
                --output-dir "$OUTPUT_DIR" \
                --overwrite-if-exists

              GENERATED_FOLDER=$(find "$OUTPUT_DIR" -mindepth 1 -maxdepth 1 -type d | head -n1)
              if [ -z "$GENERATED_FOLDER" ]; then
                echo "❌ Cookiecutter no generó ninguna carpeta de salida"
                exit 1
              fi

              echo "✅ Código generado en: $GENERATED_FOLDER"
              echo "##vso[task.setvariable variable=generatedPath;isOutput=true]$GENERATED_FOLDER"
            displayName: "Clonar template y aplicar Cookiecutter"
            name: AplicarCookiecutter

          - bash: |
              set -e
              TOKEN="$(GITHUB_TOKEN)"
              CLONE_URL="https://$TOKEN@github.com/$(newRepoFullName).git"
              GENERATED_PATH="$(AplicarCookiecutter.generatedPath)"

              cd "$GENERATED_PATH"

              git init
              git remote add origin "$CLONE_URL"
              git config user.email "pipeline@azure-devops.local"
              git config user.name  "Azure Pipeline"

              echo "🌿 Subiendo rama main..."
              git checkout -B main
              git add .
              git commit -m "feat: initial project structure from $(REPO_TEMPLATE) template

              Generated by Azure Pipeline
              - Template  : $(REPO_TEMPLATE)
              - Project   : $(PROJECT_NAME)
              - Repo      : $(NEW_REPO_NAME)"

              git push origin main --force

              echo "🌿 Creando y subiendo rama develop..."
              git checkout -b develop
              git push origin develop

              echo "✅ Ramas main y develop subidas"
              echo "⏳ Esperando 8 segundos para que GitHub indexe las ramas..."
              sleep 8
            displayName: "Subir código generado al nuevo repositorio"

          - bash: |
              echo "⚠️ Fallo al aplicar template o subir código. Iniciando rollback..."
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X DELETE \
                -H "Authorization: Bearer $(GITHUB_TOKEN)" \
                "https://api.github.com/repos/$(newRepoFullName)")

              if [ "$HTTP_CODE" = "204" ]; then
                echo "✅ Repositorio eliminado en rollback"
              else
                echo "##vso[task.logissue type=warning]No se pudo eliminar el repositorio en rollback (HTTP $HTTP_CODE)"
              fi
              exit 1
            condition: failed()
            displayName: "Rollback — eliminar repo si hubo error"

      # ==============================================================
      # JOB 4 — Protección de ramas (best-effort)
      # ==============================================================
      - job: ProteccionRamas
        displayName: "Job 4 · Protección de ramas (best-effort)"
        pool:
          name: Default
        dependsOn:
          - AplicarTemplateYSubirCodigo
          - CreacionRepositorio
        variables:
          newRepoFullName: $[ dependencies.CreacionRepositorio.outputs['CrearRepo.newRepoFullName'] ]
        steps:
          - bash: |
              protect_with_ruleset() {
                BRANCH=$1
                BODY=$(cat <<EOF
              {
                "name": "protect-$BRANCH",
                "target": "branch",
                "enforcement": "active",
                "conditions": {
                  "ref_name": {
                    "include": ["refs/heads/$BRANCH"],
                    "exclude": []
                  }
                },
                "rules": [
                  {
                    "type": "pull_request",
                    "parameters": {
                      "required_approving_review_count": 1,
                      "dismiss_stale_reviews_on_push": true,
                      "require_code_owner_review": false,
                      "require_last_push_approval": false,
                      "required_review_thread_resolution": false
                    }
                  },
                  { "type": "non_fast_forward" },
                  { "type": "deletion" }
                ]
              }
              EOF
              )
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                  -X POST \
                  -H "Authorization: Bearer $(GITHUB_TOKEN)" \
                  -H "Accept: application/vnd.github+json" \
                  -H "Content-Type: application/json" \
                  -d "$BODY" \
                  "https://api.github.com/repos/$(newRepoFullName)/rulesets")
                return $([ "$HTTP_CODE" = "201" ] && echo 0 || echo 1)
              }

              protect_with_branch_protection() {
                BRANCH=$1
                BODY=$(cat <<EOF
              {
                "required_status_checks": null,
                "enforce_admins": true,
                "required_pull_request_reviews": {
                  "required_approving_review_count": 1,
                  "dismiss_stale_reviews": true,
                  "require_code_owner_reviews": false
                },
                "restrictions": null,
                "allow_force_pushes": false,
                "allow_deletions": false
              }
              EOF
              )
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                  -X PUT \
                  -H "Authorization: Bearer $(GITHUB_TOKEN)" \
                  -H "Accept: application/vnd.github+json" \
                  -H "Content-Type: application/json" \
                  -d "$BODY" \
                  "https://api.github.com/repos/$(newRepoFullName)/branches/$BRANCH/protection")
                return $([ "$HTTP_CODE" = "200" ] && echo 0 || echo 1)
              }

              protect_branch() {
                BRANCH=$1
                echo "🛡️ Intentando proteger rama '$BRANCH'..."

                if protect_with_ruleset "$BRANCH"; then
                  echo "✅ '$BRANCH' protegida con Rulesets"
                  return
                fi

                echo "⚠️ Rulesets falló en '$BRANCH' → intentando Branch Protection legacy..."

                if protect_with_branch_protection "$BRANCH"; then
                  echo "✅ '$BRANCH' protegida con Branch Protection legacy"
                  return
                fi

                echo "##vso[task.logissue type=warning]No se pudo proteger '$BRANCH' con ningún método."
                echo "##vso[task.logissue type=warning]Aplica la protección manualmente desde GitHub → Settings → Branches."
              }

              protect_branch "main"
              protect_branch "develop"
              exit 0
            displayName: "Aplicar protección en main y develop"

      # ==============================================================
      # JOB 5 — Resumen final
      # ==============================================================
      - job: ResumenFinal
        displayName: "Job 5 · Resumen final"
        pool:
          name: Default
        dependsOn:
          - AplicarTemplateYSubirCodigo
          - ProteccionRamas
        condition: succeeded('AplicarTemplateYSubirCodigo')
        variables:
          newRepoUrl: $[ dependencies.AplicarTemplateYSubirCodigo.outputs['CrearRepo.newRepoUrl'] ]
          newRepoFullName: $[ dependencies.AplicarTemplateYSubirCodigo.outputs['CrearRepo.newRepoFullName'] ]
        steps:
          - bash: |
              echo "========================================"
              echo "✅ Repositorio creado y configurado"
              echo "📦 Template    : $(REPO_TEMPLATE)"
              echo "📛 Proyecto    : $(PROJECT_NAME)"
              echo "🗂️  Repositorio : $(NEW_REPO_NAME)"
              echo "🔒 Visibilidad : $(REPO_VISIBILITY)"
              echo "🌿 Ramas       : main, develop"
              echo "🛡️ Protección  : ver logs del Job 4"
              echo "========================================"
            displayName: "Mostrar resumen"

  # ==============================================================
  # STAGE — Notificar éxito a Port
  # ==============================================================
  - stage: update_run_success
    displayName: "Notificar éxito a Port"
    dependsOn: Pipeline
    condition: succeeded('Pipeline')
    jobs:
      - job: update_success
        displayName: "Enviar SUCCESS a Port"
        pool:
          name: Default
        steps:
          - bash: |
              set -e

              echo "🔑 Obteniendo token de Port..."
              AUTH_RESPONSE=$(curl -s -X POST \
                -H "Content-Type: application/json" \
                -d "{\"clientId\": \"$(PORT_CLIENT_ID)\", \"clientSecret\": \"$(PORT_CLIENT_SECRET)\"}" \
                "https://api.getport.io/v1/auth/access_token")

              TOKEN=$(echo "$AUTH_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['accessToken'])")
              echo "✅ Token de Port obtenido"

              curl -s -X PATCH \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $TOKEN" \
                -d '{"status": "SUCCESS", "message": {"run_status": "Pipeline completed successfully!"}}' \
                "https://api.getport.io/v1/actions/runs/$(RUN_ID)"

              echo "✅ Port notificado: SUCCESS"
            displayName: "PATCH run → SUCCESS"

  # ==============================================================
  # STAGE — Notificar fallo a Port
  # ==============================================================
  - stage: update_run_failed
    displayName: "Notificar fallo a Port"
    dependsOn: Pipeline
    condition: failed('Pipeline')
    jobs:
      - job: update_failed
        displayName: "Enviar FAILURE a Port"
        pool:
          name: Default
        steps:
          - bash: |
              set -e

              echo "🔑 Obteniendo token de Port..."
              AUTH_RESPONSE=$(curl -s -X POST \
                -H "Content-Type: application/json" \
                -d "{\"clientId\": \"$(PORT_CLIENT_ID)\", \"clientSecret\": \"$(PORT_CLIENT_SECRET)\"}" \
                "https://api.getport.io/v1/auth/access_token")

              TOKEN=$(echo "$AUTH_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['accessToken'])")
              echo "✅ Token de Port obtenido"

              curl -s -X PATCH \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $TOKEN" \
                -d '{"status": "FAILURE", "message": {"run_status": "Pipeline failed!"}}' \
                "https://api.getport.io/v1/actions/runs/$(RUN_ID)"

              echo "✅ Port notificado: FAILURE"
            displayName: "PATCH run → FAILURE"
